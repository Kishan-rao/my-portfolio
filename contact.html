    <style>
        /* Reusing styles from index.html for consistency */
        @view-transition {
            navigation: auto;
        }

        ::view-transition-old(root),
        ::view-transition-new(root) {
            animation-duration: 0.3s;
        }

        :root {
            --bg-body: #0f172a;
            --bg-sidebar: rgba(15, 23, 42, 0.85);
            --bg-surface: rgba(30, 41, 59, 0.7);
            --text-main: #f1f5f9;
            --text-muted: #94a3b8;
            --primary: #8b5cf6;
            --secondary: #10b981;
            --border: #1e293b;
            --sidebar-width: 280px;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.3);
            --radius: 16px;
            --radius-btn: 12px;
            --transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* LIGHT THEME OVERRIDES */
        html.light-theme {
            --bg-body: #f8fafc;
            --bg-sidebar: rgba(255, 255, 255, 0.9);
            --bg-surface: rgba(255, 255, 255, 0.85);
            --text-main: #0f172a;
            --text-muted: #475569;
            --primary: #7c3aed;
            --secondary: #059669;
            --border: #e2e8f0;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.08);
        }

        /* Smooth theme transition */
        *, *::before, *::after {
            transition: background-color 0.3s ease, border-color 0.3s ease, color 0.3s ease, box-shadow 0.3s ease;
        }

        /* THEME TOGGLE BUTTON */
        .theme-toggle {
            margin-top: auto;
            padding-top: 20px;
            width: 100%;
        }

        #themeToggleBtn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            width: 100%;
            padding: 10px 16px;
            border-radius: var(--radius-btn);
            border: 1px solid var(--border);
            background: var(--bg-surface);
            color: var(--text-muted);
            font-family: inherit;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
        }

        #themeToggleBtn:hover {
            background: rgba(139, 92, 246, 0.1);
            color: var(--primary);
            border-color: var(--primary);
        }

        /* Light mode form field fix */
        html.light-theme .form-group input,
        html.light-theme .form-group textarea {
            background: rgba(248, 250, 252, 0.9);
            color: var(--text-main);
        }

        html.light-theme body::before {
            background: radial-gradient(circle, rgba(124, 58, 237, 0.05) 0%, transparent 70%);
        }
        html.light-theme body::after {
            background: radial-gradient(circle, rgba(236, 72, 153, 0.03) 0%, transparent 70%);
        }
        html.light-theme .mobile-drawer-inner {
            background: rgba(248, 250, 252, 0.98);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: "Poppins", sans-serif;
            background: var(--bg-body);
            color: var(--text-main);
            display: flex;
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            top: -20%;
            left: -10%;
            width: 60vw;
            height: 60vh;
            background: radial-gradient(circle, rgba(139, 92, 246, 0.08) 0%, transparent 70%);
            pointer-events: none;
            z-index: 0;
            animation: pulseGlow 8s ease-in-out infinite alternate;
        }

        body::after {
            content: '';
            position: fixed;
            bottom: -20%;
            right: -10%;
            width: 50vw;
            height: 50vh;
            background: radial-gradient(circle, rgba(236, 72, 153, 0.05) 0%, transparent 70%);
            pointer-events: none;
            z-index: 0;
            animation: pulseGlow 10s ease-in-out infinite alternate-reverse;
        }

        @keyframes pulseGlow {
            0% { opacity: 0.5; transform: scale(1); }
            100% { opacity: 1; transform: scale(1.15); }
        }

        /* SIDEBAR — Level 1 Glass */
        .navbar {
            width: var(--sidebar-width);
            background: var(--bg-sidebar);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            height: 100vh;
            position: fixed;
            left: 0;
            top: 0;
            padding: 40px 25px;
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            z-index: 50;
            view-transition-name: sidebar;
            animation: sidebarSlideIn 0.5s var(--transition) both;
        }

        @keyframes sidebarSlideIn {
            from { opacity: 0; transform: translateX(-30px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .profile-photo {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            overflow: hidden;
            border: 3px solid rgba(139, 92, 246, 0.4);
            margin-bottom: 20px;
            box-shadow: 0 0 20px rgba(139, 92, 246, 0.15);
            view-transition-name: profile-photo;
            cursor: pointer;
            transition: var(--transition);
        }

        .profile-photo:hover {
            transform: scale(1.08);
            border-color: var(--primary);
            box-shadow: 0 0 30px rgba(139, 92, 246, 0.3);
        }

        .profile-photo img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .brand-text h1 {
            font-size: 22px;
            margin: 0 0 5px 0;
            color: var(--text-main);
        }

        .brand-text .sub {
            font-size: 14px;
            color: var(--text-muted);
            margin-bottom: 30px;
            display: block;
            font-weight: 600;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .nav-links {
            display: flex;
            flex-direction: column;
            width: 100%;
            gap: 10px;
        }

        .nav-links a {
            padding: 12px 20px;
            border-radius: var(--radius-btn);
            color: var(--text-muted);
            text-decoration: none;
            font-weight: 600;
            transition: var(--transition);
        }

        .nav-links a:hover {
            background: rgba(139, 92, 246, 0.1);
            color: var(--primary);
        }

        .nav-links a.active {
            background: var(--primary);
            color: white;
            box-shadow: 0 4px 15px rgba(139, 92, 246, 0.4);
        }

        /* SOCIAL LINKS */
        .social-links {
            display: flex;
            gap: 12px;
            margin-top: 20px;
        }

        .social-links a {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 38px;
            height: 38px;
            border-radius: 50%;
            background: rgba(30, 41, 59, 0.8);
            color: var(--text-muted);
            transition: var(--transition);
            border: 1px solid var(--border);
        }

        .social-links a:hover {
            transform: translateY(-3px) rotate(5deg);
            box-shadow: 0 4px 15px rgba(139, 92, 246, 0.25);
        }

        .social-links a.linkedin:hover {
            background: #0077b5;
            color: white;
            border-color: #0077b5;
        }

        .social-links a.github:hover {
            background: #e2e8f0;
            color: #0f172a;
            border-color: #e2e8f0;
        }

        .connect-section {
            margin-top: 30px;
            padding: 24px;
            background: var(--bg-surface);
            backdrop-filter: blur(12px);
            border-radius: var(--radius);
            border: 1px solid var(--border);
            box-shadow: var(--shadow);
            text-align: center;
            transition: var(--transition);
        }

        .connect-section:hover {
            border-color: rgba(139, 92, 246, 0.3);
        }

        .connect-section h3 {
            margin: 0 0 16px 0;
            font-size: 18px;
            color: var(--text-main);
        }

        .connect-links {
            display: flex;
            justify-content: center;
            gap: 16px;
        }

        .connect-links a {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 20px;
            border-radius: var(--radius-btn);
            text-decoration: none;
            font-weight: 600;
            font-size: 14px;
            transition: var(--transition);
            border: 1px solid var(--border);
        }

        .connect-links a.linkedin-btn {
            background: rgba(0, 119, 181, 0.12);
            color: #38bdf8;
            border-color: rgba(0, 119, 181, 0.3);
        }

        .connect-links a.linkedin-btn:hover {
            background: #0077b5;
            color: white;
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(0, 119, 181, 0.3);
        }

        .connect-links a.github-btn {
            background: rgba(241, 245, 249, 0.05);
            color: var(--text-muted);
            border-color: rgba(241, 245, 249, 0.2);
        }

        .connect-links a.github-btn:hover {
            background: #e2e8f0;
            color: #0f172a;
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(241, 245, 249, 0.2);
        }

        /* MODAL */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(8px);
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .modal-content {
            max-width: 90%;
            max-height: 80vh;
            border-radius: var(--radius);
            border: 2px solid rgba(139, 92, 246, 0.3);
        }

        .close {
            position: absolute;
            top: 20px;
            right: 40px;
            color: white;
            font-size: 40px;
            cursor: pointer;
            transition: var(--transition);
        }

        .close:hover { color: var(--primary); }

        .modal-btn {
            margin-top: 20px;
            padding: 12px 30px;
            background: rgba(139, 92, 246, 0.15);
            color: var(--primary);
            border: 1px solid rgba(139, 92, 246, 0.3);
            border-radius: var(--radius-btn);
            cursor: pointer;
            font-weight: 700;
            transition: var(--transition);
        }

        .modal-btn:hover {
            background: var(--primary);
            color: white;
        }

        /* HAMBURGER */
        .hamburger {
            display: none;
            flex-direction: column;
            justify-content: center;
            gap: 5px;
            background: none;
            border: none;
            cursor: pointer;
            padding: 4px;
        }
        .hamburger span {
            display: block;
            width: 22px;
            height: 2px;
            background: var(--text-main);
            border-radius: 2px;
            transition: var(--transition);
        }
        .mobile-drawer {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(4px);
            z-index: 200;
        }
        .mobile-drawer.open { display: block; }
        .mobile-drawer-inner {
            position: absolute;
            top: 0; right: 0;
            width: 240px;
            height: 100%;
            background: rgba(15, 23, 42, 0.95);
            backdrop-filter: blur(16px);
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            border-left: 1px solid var(--border);
        }
        .mobile-drawer-inner a {
            padding: 12px 16px;
            border-radius: var(--radius-btn);
            text-decoration: none;
            font-weight: 600;
            color: var(--text-muted);
            transition: var(--transition);
        }
        .mobile-drawer-inner a:hover { background: rgba(139, 92, 246, 0.15); color: var(--primary); }
        .mobile-drawer-inner .close-drawer {
            font-size: 22px;
            align-self: flex-end;
            cursor: pointer;
            color: var(--text-muted);
            background: none;
            border: none;
            margin-bottom: 10px;
        }

        /* PAGE TRANSITION */
        @keyframes fadeInSlide {
            from { opacity: 0; transform: translateY(20px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        /* CONTENT AREA */
        main {
            margin-left: var(--sidebar-width);
            padding: 60px;
            width: calc(100% - var(--sidebar-width));
            max-width: calc(var(--sidebar-width) + 900px);
            min-height: 100vh;
            animation: fadeInSlide 0.6s var(--transition) both;
            position: relative;
            z-index: 1;
        }

        h2 {
            font-size: 32px;
            margin-bottom: 30px;
            color: var(--text-main);
            border-bottom: 2px solid var(--border);
            padding-bottom: 15px;
        }

        /* CONTACT FORM */
        .contact-container {
            max-width: 600px;
            background: var(--bg-surface);
            backdrop-filter: blur(12px);
            padding: 40px;
            border-radius: var(--radius);
            border: 1px solid var(--border);
            box-shadow: var(--shadow);
            transition: var(--transition);
        }

        .contact-container:hover {
            border-color: rgba(139, 92, 246, 0.3);
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: var(--text-main);
        }

        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--border);
            border-radius: var(--radius-btn);
            font-family: inherit;
            font-size: 16px;
            transition: var(--transition);
            background: rgba(15, 23, 42, 0.6);
            color: var(--text-main);
        }

        .form-group input::placeholder,
        .form-group textarea::placeholder {
            color: var(--text-muted);
        }

        .form-group input:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(139, 92, 246, 0.15);
        }

        .form-group textarea {
            height: 150px;
            resize: vertical;
        }

        .btn-submit {
            background: var(--primary);
            color: white;
            border: none;
            padding: 14px 30px;
            border-radius: var(--radius-btn);
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            width: 100%;
        }

        .btn-submit:hover {
            background: #7c3aed;
            box-shadow: 0 4px 20px rgba(139, 92, 246, 0.4);
            transform: translateY(-2px);
        }

        .btn-submit:disabled {
            background: var(--text-muted);
            cursor: not-allowed;
        }

        #statusMessage {
            margin-top: 20px;
            text-align: center;
            font-weight: 600;
        }

        .success {
            color: var(--secondary);
        }

        .error {
            color: #f87171;
        }

        @media (max-width: 900px) {
            body {
                flex-direction: column;
            }

            .navbar {
                width: 100%;
                height: auto;
                position: relative;
                flex-direction: row;
                justify-content: space-between;
                padding: 15px 20px;
                border-right: none;
                border-bottom: 1px solid var(--border);
                background: rgba(15, 23, 42, 0.95);
                backdrop-filter: blur(16px);
                animation: none;
            }

            .profile-photo {
                width: 50px;
                height: 50px;
                margin: 0;
                border-width: 2px;
            }

            .brand-text {
                text-align: left;
                margin-left: 15px;
            }

            .brand-text h1 {
                font-size: 18px;
            }

            .brand-text .sub {
                display: none;
            }

            .nav-links,
            .social-links {
                display: none;
            }

            .hamburger { display: flex; }

            main {
                margin-left: 0;
                width: 100%;
                padding: 30px;
            }
        }
    </style>
</head>

    </main>

    <script>
        const photoTrigger = document.getElementById('photoTrigger');
        const modal = document.getElementById('imageModal');
        const fullImage = document.getElementById('fullImage');
        const profileThumb = document.getElementById('profileThumb');
        const closeModal = document.getElementById('closeModal');
        const changePhotoBtn = document.getElementById('changePhotoBtn');
        const fileInput = document.getElementById('fileInput');

        // Load profile pic if saved
        const savedImage = localStorage.getItem('myProfilePic');
        if (savedImage) { profileThumb.src = savedImage; }

        photoTrigger.addEventListener('click', function () {
            modal.style.display = "flex";
            fullImage.src = profileThumb.src;
        });
        closeModal.addEventListener('click', function () { modal.style.display = "none"; });
        window.addEventListener('click', function (event) { if (event.target == modal) { modal.style.display = "none"; } });
        changePhotoBtn.addEventListener('click', function () { fileInput.click(); });
        fileInput.addEventListener('change', function (e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function (e) {
                    const result = e.target.result;
                    profileThumb.src = result; fullImage.src = result; localStorage.setItem('myProfilePic', result);
                }
                reader.readAsDataURL(file);
            }
        });

        const form = document.getElementById('contactForm');
        const statusDiv = document.getElementById('statusMessage');
        const submitBtn = document.getElementById('submitBtn');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            submitBtn.disabled = true;
            submitBtn.textContent = "Sending...";
            statusDiv.textContent = "";

            const formData = {
                name: document.getElementById('name').value,
                email: document.getElementById('email').value,
                message: document.getElementById('message').value
            };

            try {
                const response = await fetch('/api/contact', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(formData)
                });

                const result = await response.json();

                if (response.ok) {
                    statusDiv.innerHTML = `<span class="success">✅ ${result.message}</span>`;
                    form.reset();
                } else {
                    statusDiv.innerHTML = `<span class="error">❌ ${result.error}</span>`;
                }
            } catch (error) {
                statusDiv.innerHTML = `<span class="error">❌ Failed to send message. Is the server running?</span>`;
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = "Send Message";
            }
        });


        // Mobile Hamburger
        const hamburgerBtn = document.getElementById('hamburgerBtn');
        const mobileDrawer  = document.getElementById('mobileDrawer');
        const closeDrawer   = document.getElementById('closeDrawer');
        if (hamburgerBtn) {
            hamburgerBtn.addEventListener('click', () => mobileDrawer.classList.add('open'));
            closeDrawer.addEventListener('click',  () => mobileDrawer.classList.remove('open'));
            mobileDrawer.addEventListener('click', (e) => {
                if (e.target === mobileDrawer) mobileDrawer.classList.remove('open');
            });
        }
    </script>
    <script src="assets/theme.js"></script>
