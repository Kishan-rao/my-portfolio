<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Me - Y Kishan Rao</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        /* Reusing styles from index.html for consistency */
        @view-transition {
            navigation: auto;
        }

        ::view-transition-old(root),
        ::view-transition-new(root) {
            animation-duration: 0.3s;
        }

        :root {
            --bg-body: #ffffff;
            --bg-sidebar: #f8fafc;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --primary: #2563eb;
            --secondary: #10b981;
            --border: #e2e8f0;
            --sidebar-width: 280px;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: "Poppins", sans-serif;
            background: var(--bg-body);
            color: var(--text-main);
            display: flex;
            min-height: 100vh;
        }

        /* SIDEBAR */
        .navbar {
            width: var(--sidebar-width);
            background: var(--bg-sidebar);
            height: 100vh;
            position: fixed;
            left: 0;
            top: 0;
            padding: 40px 25px;
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            z-index: 50;
            view-transition-name: sidebar;
        }

        .profile-photo {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            overflow: hidden;
            border: 4px solid white;
            margin-bottom: 20px;
            box-shadow: var(--shadow);
            view-transition-name: profile-photo;
            cursor: pointer;
            /* Added cursor pointer */
        }

        .profile-photo img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .brand-text h1 {
            font-size: 22px;
            margin: 0 0 5px 0;
            color: var(--text-main);
        }

        .brand-text .sub {
            font-size: 14px;
            color: var(--text-muted);
            margin-bottom: 30px;
            display: block;
            font-weight: 600;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .nav-links {
            display: flex;
            flex-direction: column;
            width: 100%;
            gap: 10px;
        }

        .nav-links a {
            padding: 12px 20px;
            border-radius: 8px;
            color: var(--text-muted);
            text-decoration: none;
            font-weight: 600;
            transition: 0.2s;
        }

        .nav-links a:hover {
            background: #e2e8f0;
            color: var(--text-main);
        }

        .nav-links a.active {
            background: var(--primary);
            color: white;
            box-shadow: 0 4px 10px rgba(37, 99, 235, 0.3);
        }

        /* MODAL */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(5px);
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .modal-content {
            max-width: 90%;
            max-height: 80vh;
            border-radius: 10px;
            border: 4px solid white;
        }

        .close {
            position: absolute;
            top: 20px;
            right: 40px;
            color: white;
            font-size: 40px;
            cursor: pointer;
        }

        .modal-btn {
            margin-top: 20px;
            padding: 12px 30px;
            background: white;
            color: black;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            font-weight: 700;
        }

        /* CONTENT AREA */
        main {
            margin-left: var(--sidebar-width);
            padding: 60px;
            width: calc(100% - var(--sidebar-width));
            min-height: 100vh;
        }

        h2 {
            font-size: 32px;
            margin-bottom: 30px;
            color: var(--text-main);
            border-bottom: 2px solid var(--border);
            padding-bottom: 15px;
        }

        /* CONTACT FORM */
        .contact-container {
            max-width: 600px;
            background: white;
            padding: 40px;
            border-radius: 16px;
            border: 1px solid var(--border);
            box-shadow: var(--shadow);
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: var(--text-main);
        }

        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-family: inherit;
            font-size: 16px;
            transition: 0.2s;
        }

        .form-group input:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
        }

        .form-group textarea {
            height: 150px;
            resize: vertical;
        }

        .btn-submit {
            background: var(--primary);
            color: white;
            border: none;
            padding: 14px 30px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
            width: 100%;
        }

        .btn-submit:hover {
            background: #1d4ed8;
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.3);
        }

        .btn-submit:disabled {
            background: var(--text-muted);
            cursor: not-allowed;
        }

        #statusMessage {
            margin-top: 20px;
            text-align: center;
            font-weight: 600;
        }

        .success {
            color: var(--secondary);
        }

        .error {
            color: #ef4444;
        }

        @media (max-width: 900px) {
            body {
                flex-direction: column;
            }

            .navbar {
                width: 100%;
                height: auto;
                position: relative;
                flex-direction: row;
                justify-content: space-between;
                padding: 15px 20px;
                border-right: none;
                border-bottom: 1px solid var(--border);
                background: white;
            }

            .profile-photo {
                width: 50px;
                height: 50px;
                margin: 0;
                border-width: 2px;
            }

            .brand-text {
                text-align: left;
                margin-left: 15px;
            }

            .brand-text h1 {
                font-size: 18px;
            }

            .brand-text .sub {
                display: none;
            }

            .nav-links {
                display: flex;
                flex-direction: row;
                width: auto;
                gap: 10px;
            }

            .nav-links a {
                padding: 5px 12px;
                font-size: 12px;
            }

            main {
                margin-left: 0;
                width: 100%;
                padding: 30px;
            }
        }
    </style>
</head>

<body>

    <aside class="navbar">
        <span class="profile-photo" id="photoTrigger">
            <img src="assets/profile.png" id="profileThumb" alt="Profile">
        </span>
        <div class="brand-text">
            <h1>Y Kishan Rao</h1>
            <span class="sub">Portfolio</span>
        </div>
        <nav class="nav-links">
            <a href="index.html">Home</a>
        </nav>
    </aside>

    <div id="imageModal" class="modal">
        <span class="close" id="closeModal">&times;</span>
        <img class="modal-content" id="fullImage">
        <button class="modal-btn" id="changePhotoBtn">Update Photo</button>
    </div>
    <input type="file" id="fileInput" accept="image/*" style="display: none;">

    <main>
        <h2>Get in Touch</h2>
        <div class="contact-container">
            <form id="contactForm">
                <div class="form-group">
                    <label for="name">Name</label>
                    <input type="text" id="name" name="name" required placeholder="Your Name">
                </div>
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" required placeholder="your.email@example.com">
                </div>
                <div class="form-group">
                    <label for="message">Message</label>
                    <textarea id="message" name="message" required placeholder="Write your message here..."></textarea>
                </div>
                <button type="submit" class="btn-submit" id="submitBtn">Send Message</button>
            </form>
            <div id="statusMessage"></div>
        </div>

        <footer style="text-align: center; padding: 20px; color: var(--text-muted); font-size: 14px; margin-top: 40px;">
            <p>Total Visits: <span id="visitCount">Loading...</span></p>
        </footer>
    </main>

    <script>
        const photoTrigger = document.getElementById('photoTrigger');
        const modal = document.getElementById('imageModal');
        const fullImage = document.getElementById('fullImage');
        const profileThumb = document.getElementById('profileThumb');
        const closeModal = document.getElementById('closeModal');
        const changePhotoBtn = document.getElementById('changePhotoBtn');
        const fileInput = document.getElementById('fileInput');

        // Load profile pic if saved
        const savedImage = localStorage.getItem('myProfilePic');
        if (savedImage) { profileThumb.src = savedImage; }

        photoTrigger.addEventListener('click', function () {
            modal.style.display = "flex";
            fullImage.src = profileThumb.src;
        });
        closeModal.addEventListener('click', function () { modal.style.display = "none"; });
        window.addEventListener('click', function (event) { if (event.target == modal) { modal.style.display = "none"; } });
        changePhotoBtn.addEventListener('click', function () { fileInput.click(); });
        fileInput.addEventListener('change', function (e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function (e) {
                    const result = e.target.result;
                    profileThumb.src = result; fullImage.src = result; localStorage.setItem('myProfilePic', result);
                }
                reader.readAsDataURL(file);
            }
        });

        const form = document.getElementById('contactForm');
        const statusDiv = document.getElementById('statusMessage');
        const submitBtn = document.getElementById('submitBtn');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            submitBtn.disabled = true;
            submitBtn.textContent = "Sending...";
            statusDiv.textContent = "";

            const formData = {
                name: document.getElementById('name').value,
                email: document.getElementById('email').value,
                message: document.getElementById('message').value
            };

            try {
                const response = await fetch('/api/contact', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(formData)
                });

                const result = await response.json();

                if (response.ok) {
                    statusDiv.innerHTML = `<span class="success">✅ ${result.message}</span>`;
                    form.reset();
                } else {
                    statusDiv.innerHTML = `<span class="error">❌ ${result.error}</span>`;
                }
            } catch (error) {
                statusDiv.innerHTML = `<span class="error">❌ Failed to send message. Is the server running?</span>`;
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = "Send Message";
            }
        });

        // Visitor Counter
        fetch('/api/visit')
            .then(res => res.json())
            .then(data => {
                document.getElementById('visitCount').textContent = data.count;
            })
            .catch(err => console.error('Error fetching visitor count:', err));
    </script>
</body>

</html>
